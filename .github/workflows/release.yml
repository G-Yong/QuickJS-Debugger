name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read

  package-and-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Package Linux
      run: |
        cd artifacts/qjs_debug-linux
        tar czf ../qjs_debug-linux-x86_64.tar.gz qjs_debug

    - name: Package Windows
      run: |
        cd artifacts/qjs_debug-windows
        zip ../qjs_debug-windows-x86_64.zip qjs_debug.exe

    - name: Package macOS
      run: |
        cd artifacts/qjs_debug-macos
        tar czf ../qjs_debug-macos-arm64.tar.gz qjs_debug

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          artifacts/qjs_debug-linux-x86_64.tar.gz
          artifacts/qjs_debug-windows-x86_64.zip
          artifacts/qjs_debug-macos-arm64.tar.gz
